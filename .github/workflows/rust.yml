name: rustup-toolchain-install-master

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "on"
  RUSTC_WRAPPER: "sccache"
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  macOS:
    name: macOS-26
    runs-on: macos-26

    steps:
      - name: Disable macos spotlight index
        run: |
          sudo mdutil -a -i off
          sudo mdutil -a -d
          sudo pmset -a powernap 0
          sudo pmset -a sleep 0

      - name: Checkout
        uses: actions/checkout@v5

      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: "true"
          cache-workspace-crates: "true"

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@main

      - name: Build Release
        run: |
          cargo update
          set +e -x

          targets=(
            aarch64-apple-darwin
            arm64e-apple-darwin
            x86_64h-apple-darwin
          )

          for target in ${targets[@]}; do
            time cargo s $target
          done

          find ./target \( -iname img -o -iname img.exe -o -iname img.wasm -o -iname Img-Universal \) -type f | xargs ls -hl
          sw_vers
          hostinfo
          sysctl -n machdep.cpu.brand_string

      - name: Rust Versions
        run: rustup -V; cargo -Vv; rustc -Vv

      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            target/**/rustup-toolchain-install-master
            !target/**/*.d
          if-no-files-found: ignore

      - name: Upload binaries to a GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          targets=(
                  "x86_64h-apple-darwin Apple-macOS-x86_64h"
                  "aarch64-apple-darwin Apple-macOS-aarch64"
                  "arm64e-apple-darwin Apple-macOS-arm64e"
          )

          for target in "${targets[@]}"; do
            read -r arch name <<< "$target"
            echo "Uploading $name..."
            for f in rustup-toolchain-install-master; do
                if [ -f "target/$arch/src/$f" ]; then
                  mv target/$arch/src/$f target/$arch/src/$name || true
                  gh release upload Nightly target/$arch/src/$name --clobber || true
                  break
                fi
            done
          done
